name: ALP MVP CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run quality gate
        run: |
          chmod +x ./scripts/quality_gate.sh
          ./scripts/quality_gate.sh
